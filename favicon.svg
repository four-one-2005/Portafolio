<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Gradiente lineal de fondo para un efecto premium -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0e0c1b"/>
      <stop offset="100%" stop-color="#050505"/>
    </linearGradient>
    
    <!-- Gradiente para el monograma y el borde -->
    <linearGradient id="primary-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    
    <!-- Sombra para darle profundidad -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Fondo redondeado suave con borde sutil -->
  <rect x="16" y="16" width="480" height="480" rx="120" fill="url(#bg-grad)" stroke="url(#primary-grad)" stroke-width="12" />
  
  <!-- Círculos de brillo de fondo sutiles -->
  <circle cx="120" cy="120" r="180" fill="#8b5cf6" opacity="0.15" filter="blur(40px)" />
  <circle cx="392" cy="392" r="180" fill="#6366f1" opacity="0.15" filter="blur(40px)" />

  <!-- Monograma "S" con punto "." -->
  <g transform="translate(256, 256)">
    <!-- Letra S principal -->
    <text x="-15" y="85" 
          font-family="'Outfit', 'Inter', system-ui, sans-serif" 
          font-size="280" 
          font-weight="800" 
          fill="url(#primary-grad)" 
          text-anchor="middle"
          filter="url(#glow)">S</text>
          
    <!-- El punto característico del logotipo "SOP." -->
    <circle cx="135" cy="65" r="35" fill="#8b5cf6" filter="url(#glow)" />
  </g>
</svg>
